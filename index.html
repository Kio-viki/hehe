<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《静夜思》· 明月闯关阁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', '华文楷体', 'KaiTi', 'Microsoft YaHei', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #0b1f3a 0%, #1b3b5c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
        }
        /* 夜空闪烁星星 */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 40px 70px, #f8f0a0, rgba(0,0,0,0)),
                              radial-gradient(3px 3px at 120px 240px, #ffecb3, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 85% 30%, #fff, rgba(0,0,0,0)),
                              radial-gradient(4px 4px at 15% 70%, #ffe68f, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 250px 250px;
            opacity: 0.5;
            pointer-events: none;
        }
        .game-container {
            position: relative;
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 248, 235, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 56px 56px 48px 48px;
            box-shadow: 0 30px 40px rgba(0, 0, 0, 0.5), 0 0 0 2px #f3d9b1 inset, 0 0 0 6px #a56b3b inset;
            padding: 24px 24px 40px;
            transition: 0.3s;
            border: 2px solid #e0b87b;
        }
        /* 屋顶中式装饰 */
        .game-header {
            background: #c88141;
            border-radius: 120px 120px 48px 48px;
            padding: 22px 20px 16px;
            margin-top: -48px;
            margin-bottom: 30px;
            box-shadow: 0 12px 0 #7b4a2c, 0 16px 20px rgba(0,0,0,0.3);
            text-align: center;
            border-bottom: 4px solid #f5d742;
            position: relative;
        }
        .game-header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: #fef7e0;
            text-shadow: 4px 4px 0 #b45f2b, 6px 6px 0 #3f2a16;
            letter-spacing: 8px;
            word-break: keep-all;
        }
        .game-header p {
            font-size: 1.3rem;
            color: #fff1b8;
            background: #6a3f1e;
            display: inline-block;
            padding: 8px 32px;
            border-radius: 60px;
            margin-top: 6px;
            box-shadow: inset 0 -3px 0 #3b281a;
            font-style: italic;
        }
        .moon-icon {
            font-size: 3rem;
            filter: drop-shadow(0 0 10px #fff9d0);
        }
        /* 三道关卡卡片 */
        .level-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 24px;
            margin: 36px 0 24px;
        }
        .level-card {
            flex: 1 1 220px;
            background: #faf0d7;
            border-radius: 48px 48px 32px 32px;
            padding: 24px 16px 20px;
            box-shadow: 0 12px 0 #9e6b3e, 0 16px 16px rgba(0,0,0,0.25);
            cursor: pointer;
            transition: 0.15s linear;
            text-align: center;
            border: 3px solid #eeb76b;
        }
        .level-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 0 #9e6b3e, 0 20px 20px rgba(0,0,0,0.3);
            background: #fffaec;
        }
        .level-card.selected {
            transform: scale(1.02) translateY(-6px);
            box-shadow: 0 0 0 4px #ffdb8e, 0 10px 0 #b87333, 0 20px 25px black;
            background: #fff8e7;
        }
        .level-icon {
            font-size: 3.5rem;
            margin-bottom: 8px;
        }
        .level-title {
            font-size: 1.9rem;
            font-weight: bold;
            background: #c88141;
            color: #ffefc0;
            border-radius: 40px;
            padding: 8px 0;
            margin: 6px 0;
            text-shadow: 2px 2px 0 #7b451b;
            box-shadow: inset 0 -4px 0 #5e3a1f;
        }
        .level-badge {
            background: #425b7c;
            color: white;
            border-radius: 30px;
            padding: 8px 0;
            font-size: 1.2rem;
            margin: 12px 0 0;
            border: 2px solid #fbd26a;
        }
        /* 主游戏面板 */
        .game-board {
            background: #e5d5b9;
            border-radius: 70px 70px 40px 40px;
            padding: 30px 20px 20px;
            margin: 30px 0 20px;
            box-shadow: inset 0 -8px 0 #b2916a, inset 0 8px 10px #fef1cf, 0 20px 30px rgba(0,0,0,0.35);
            border: 3px solid #ab7e4e;
        }
        .question-area {
            background: #fff9ea;
            border-radius: 60px;
            padding: 30px 20px;
            border: 4px solid #c8a26b;
            box-shadow: inset 0 0 0 3px #fdeaaf, 0 6px 0 #7d5a38;
            font-size: 1.5rem;
            color: #1f3b4a;
        }
        .options-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 30px;
            margin-bottom: 20px;
        }
        .option-btn {
            background: #be8c5b;
            border: none;
            border-radius: 120px;
            padding: 20px 24px;
            font-size: 1.4rem;
            font-weight: 600;
            color: #1f2f3a;
            text-align: left;
            box-shadow: 0 7px 0 #624a30, 0 10px 16px black;
            transition: 0.06s linear;
            border: 3px solid #fad68f;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .option-btn:hover {
            background: #dba16e;
            transform: scale(1.01);
        }
        .option-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #624a30, 0 8px 12px black;
        }
        .option-btn.disabled-true, .option-btn:disabled {
            opacity: 0.7;
            pointer-events: none;
            filter: grayscale(0.4);
        }
        .option-prefix {
            background: #edb06d;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: #242424;
            box-shadow: inset 0 -4px 0 #885f37, 0 2px 6px black;
        }
        .feedback-message {
            font-size: 1.6rem;
            padding: 18px 25px;
            border-radius: 100px;
            background: #2a445b;
            color: #f9eeb2;
            border-left: 18px solid #fdcb6e;
            margin: 24px 0 12px;
            font-weight: 500;
            box-shadow: 0 6px 0 #14222e;
        }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 16px;
        }
        .action-btn {
            background: #e2b375;
            border: none;
            border-radius: 60px;
            padding: 16px 36px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #25221c;
            box-shadow: 0 8px 0 #836538, 0 6px 16px black;
            cursor: pointer;
            transition: 0.06s linear;
            border: 3px solid #ffeec2;
            flex: 0 1 auto;
        }
        .action-btn:active {
            transform: translateY(5px);
            box-shadow: 0 3px 0 #836538, 0 6px 12px black;
        }
        .action-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .reset-btn {
            background: #9faab5;
            box-shadow: 0 8px 0 #5a6672;
        }
        .footer-note {
            text-align: center;
            margin-top: 26px;
            font-size: 1.2rem;
            color: #f2e1b9;
            text-shadow: 2px 2px 0 #3d2e1c;
        }
        .highlight {
            background-color: #ffe484;
            padding: 2px 8px;
            border-radius: 30px;
            font-weight: bold;
            color: #2d1d0b;
        }
        .level-lock {
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-header">
        <h1>🌙 静夜思 · 明月闯关 🌙</h1>
        <p> 唐 · 李白 ｜ 诗仙邀你闯三关</p>
        <div class="moon-icon">🏮 ⭐ 🏮</div>
    </div>

    <!-- 三级关卡选择 -->
    <div class="level-grid">
        <div class="level-card" data-level="1" id="level1Card">
            <div class="level-icon">🌱</div>
            <div class="level-title">第一关</div>
            <div class="level-badge">小试牛刀 · 基础记忆</div>
        </div>
        <div class="level-card" data-level="2" id="level2Card">
            <div class="level-icon">👀</div>
            <div class="level-title">第二关</div>
            <div class="level-badge">火眼金睛 · 理解观察</div>
        </div>
        <div class="level-card" data-level="3" id="level3Card">
            <div class="level-icon">🤔</div>
            <div class="level-title">第三关</div>
            <div class="level-badge">小小思考家 · 表达联想</div>
        </div>
    </div>

    <!-- 动态游戏面板 -->
    <div class="game-board">
        <div class="question-area" id="questionDisplay">
            👆 点击上方关卡开始挑战
        </div>
        <div class="options-area" id="optionsContainer">
            <!-- 选项会动态生成 -->
        </div>
        <div class="feedback-message" id="feedbackMessage">
            🌟 等你来战！
        </div>
        <div class="action-buttons">
            <button class="action-btn" id="submitBtn">⚡ 提交答案</button>
            <button class="action-btn reset-btn" id="resetBtn">🔄 重选关卡</button>
        </div>
    </div>
    <div class="footer-note">
        <span class="highlight"> 背诗小诀窍：</span> 床前→地上霜→抬头望→低头思
    </div>
</div>

<script>
    (function() {
        // --- 题库 (完全对应之前设计的题目) ---
        const questions = {
            1: [   // 第一关 小试牛刀
                {
                    type: 'fill', // 填空题其实用选项展示, 我们用选择形式
                    question: '📜 古诗《静夜思》的作者是唐代的______。',
                    options: ['李白', '杜甫', '王维', '孟浩然'],
                    correct: 0,
                    hint: '⭐ 诗仙的名字是？'
                },
                {
                    type: 'complete',
                    question: '📝 接龙：床前明月光，疑是______。',
                    options: ['地上霜', '月如霜', '屋上霜', '地上雪'],
                    correct: 0,
                    hint: '❄️ 清冷的光像什么？'
                },
                {
                    type: 'complete',
                    question: '📝 接龙：举头望明月，______。',
                    options: ['低头思故乡', '低头思故人', '回首望故乡', '低头念家乡'],
                    correct: 0,
                    hint: '🏡 低下头就想起了家'
                },
                {
                    type: 'mcq',
                    question: '❓ 诗句“疑是地上霜”中的“疑”是什么意思？',
                    options: ['A. 怀疑，以为', 'B. 疑问，问题', 'C. 固定，凝固', 'D. 好像'],
                    correct: 0,
                    hint: '🤨 诗人以为是霜，其实不是。'
                }
            ],
            2: [   // 第二关 火眼金睛
                {
                    type: 'scene',
                    question: '🎬 场景：一个人抬起头，看着天上的月亮。 对应的诗句是？',
                    options: ['举头望明月', '低头思故乡', '床前明月光', '疑是地上霜'],
                    correct: 0,
                    hint: '🌕 动作是“抬头”'
                },
                {
                    type: 'scene',
                    question: '🎬 场景：一个人低着头，好像在想着什么心事。 对应的诗句是？',
                    options: ['低头思故乡', '举头望明月', '疑是地上霜', '床前明月光'],
                    correct: 0,
                    hint: '😔 想家时头就低下了'
                },
                {
                    type: 'match',  // 连连看类型用文字匹配
                    question: '🔗 连连看：月光洒在屋子地上，一片银白。',
                    options: ['床前明月光', '疑是地上霜', '举头望明月', '低头思故乡'],
                    correct: 0,
                    hint: '✨ 第一句描写的景象'
                },
                {
                    type: 'match',
                    question: '🔗 连连看：月光太清冷，诗人差点以为是地上的霜。',
                    options: ['疑是地上霜', '床前明月光', '举头望明月', '低头思故乡'],
                    correct: 0,
                    hint: '❄️ 第二句直接对应'
                }
            ],
            3: [   // 第三关 小小思考家 (开放但设定客观选项)
                {
                    type: 'feeling',
                    question: '😌 读完这首诗，你觉得诗人当时的心情主要是？',
                    options: ['孤独、思念家乡', '开心、激动', '生气、愤怒', '兴奋、热闹'],
                    correct: 0,
                    hint: '🌙 独自望月，会想起家'
                },
                {
                    type: 'thinking',
                    question: '🏮 诗中“明月”非常重要。什么时候我们也会特别关注月亮？',
                    options: ['中秋节', '春节', '端午节', '元宵节'],
                    correct: 0,
                    hint: '🥮 团圆赏月的节日'
                },
                {
                    type: 'why',
                    question: '💭 为什么看到圆月会让人想家？（选择最合适的）',
                    options: [
                        '因为月亮代表团圆，月圆人团圆',
                        '因为月亮很亮',
                        '因为月亮上有嫦娥',
                        '因为晚上没事干'
                    ],
                    correct: 0,
                    hint: '🐇 圆圆的月亮像家人的团聚'
                },
                {
                    type: 'who',
                    question: '👪 如果你是诗人，看着月亮，最可能想起谁？',
                    options: ['亲人（父母、兄弟姐妹）', '邻居', '路上的行人', '皇帝'],
                    correct: 0,
                    hint: '❤️ 心里最挂念的人'
                }
            ]
        };

        // 当前状态
        let currentLevel = 1;          // 默认第一关选中
        let currentQuestionIndex = 0;
        let selectedOptionIndex = null; // 当前题目用户选择的选项索引(0~3)
        let feedback = '';
        let levelCompleted = false;     // 本关是否已完成(简单起见可重复)

        // DOM元素
        const level1Card = document.getElementById('level1Card');
        const level2Card = document.getElementById('level2Card');
        const level3Card = document.getElementById('level3Card');
        const questionDisplay = document.getElementById('questionDisplay');
        const optionsContainer = document.getElementById('optionsContainer');
        const feedbackMessage = document.getElementById('feedbackMessage');
        const submitBtn = document.getElementById('submitBtn');
        const resetBtn = document.getElementById('resetBtn');

        // 辅助函数：高亮关卡
        function updateLevelSelection() {
            [level1Card, level2Card, level3Card].forEach((card, idx) => {
                const level = idx + 1;
                if (level === currentLevel) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });
        }

        // 重置当前关卡题目索引从0开始，清空选择
        function resetToLevelStart() {
            currentQuestionIndex = 0;
            selectedOptionIndex = null;
            levelCompleted = false;
            renderCurrentQuestion();
        }

        // 渲染当前关卡的当前题目
        function renderCurrentQuestion() {
            const levelQuestions = questions[currentLevel];
            if (!levelQuestions) return;

            if (currentQuestionIndex >= levelQuestions.length) {
                // 通关啦
                questionDisplay.innerText = `🎉 恭喜！第${currentLevel}关所有题目挑战成功！ 🎉`;
                optionsContainer.innerHTML = '';  // 清空选项
                feedbackMessage.innerText = '🏆 太厉害了！试试其他关卡吧！';
                levelCompleted = true;
                return;
            }

            const q = levelQuestions[currentQuestionIndex];
            questionDisplay.innerText = q.question;

            // 渲染选项按钮
            let optionsHtml = '';
            q.options.forEach((opt, idx) => {
                const prefix = String.fromCharCode(65 + idx); // A,B,C,D
                optionsHtml += `
                    <button class="option-btn" data-opt-index="${idx}">
                        <span class="option-prefix">${prefix}</span>
                        <span>${opt}</span>
                    </button>
                `;
            });
            optionsContainer.innerHTML = optionsHtml;

            // 如果有之前选中的选项，高亮(不加额外高亮，用背景色区分，我们为选中加一个样式)
            if (selectedOptionIndex !== null) {
                const prevSelectedBtn = document.querySelector(`.option-btn[data-opt-index="${selectedOptionIndex}"]`);
                if (prevSelectedBtn) {
                    prevSelectedBtn.style.background = '#fbd26a';
                    prevSelectedBtn.style.border = '4px solid #b34000';
                }
            }

            // 更新反馈信息显示提示
            feedbackMessage.innerText = `✨ 提示：${q.hint}   (选择答案后点击提交)`;

            // 移除所有监听再重新绑定 (通过事件代理解决)
        }

        // 事件代理：选项点击 (通过容器监听)
        optionsContainer.addEventListener('click', (e) => {
            const optionBtn = e.target.closest('.option-btn');
            if (!optionBtn) return;
            if (levelCompleted) {
                feedbackMessage.innerText = '⚠️ 本关已完成，请重置或更换关卡';
                return;
            }
            const idx = parseInt(optionBtn.dataset.optIndex, 10);

            // 清除之前的高亮
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.style.background = '';  // 恢复默认
                btn.style.border = '';
            });

            // 设置当前选中
            selectedOptionIndex = idx;
            optionBtn.style.background = '#fbd26a';
            optionBtn.style.border = '4px solid #b34000';
        });

        // 提交答案逻辑
        function handleSubmit() {
            if (levelCompleted) {
                feedbackMessage.innerText = '🏁 关卡已完成，重置或选新关卡吧。';
                return;
            }
            const levelQuestions = questions[currentLevel];
            if (!levelQuestions || currentQuestionIndex >= levelQuestions.length) {
                return;
            }

            if (selectedOptionIndex === null) {
                feedbackMessage.innerText = '⚠️ 请先选择一个答案！';
                return;
            }

            const q = levelQuestions[currentQuestionIndex];
            const isCorrect = (selectedOptionIndex === q.correct);

            if (isCorrect) {
                // 正确：进入下一题
                feedbackMessage.innerText = '✅ 回答正确！很棒！';
                // 更新索引
                currentQuestionIndex++;
                selectedOptionIndex = null;  // 重置选中

                // 检查是否完成全部
                if (currentQuestionIndex >= levelQuestions.length) {
                    // 通关显示
                    renderCurrentQuestion();  // 会渲染通关界面
                } else {
                    renderCurrentQuestion();  // 加载下一题
                }
            } else {
                // 错误
                feedbackMessage.innerText = `❌ 再想想…… 提示：${q.hint}`;
                // 保留选中但不高亮变化，可以再次提交
            }
        }

        // 重置/重选关卡逻辑
        function resetGame() {
            // 重置当前关卡索引0
            currentQuestionIndex = 0;
            selectedOptionIndex = null;
            levelCompleted = false;
            renderCurrentQuestion();
        }

        // 切换关卡
        function setLevel(level) {
            currentLevel = level;
            currentQuestionIndex = 0;
            selectedOptionIndex = null;
            levelCompleted = false;
            updateLevelSelection();
            renderCurrentQuestion();
        }

        // 卡片绑定事件
        level1Card.addEventListener('click', () => setLevel(1));
        level2Card.addEventListener('click', () => setLevel(2));
        level3Card.addEventListener('click', () => setLevel(3));

        // 提交按钮
        submitBtn.addEventListener('click', handleSubmit);

        // 重置按钮：重置当前关卡
        resetBtn.addEventListener('click', () => {
            resetGame();
        });

        // 初始化
        updateLevelSelection();
        renderCurrentQuestion();

        // 额外处理：当某个关卡点击时确保清除高亮
        // 以及在切换题目时清除所有选中高亮
    })();
</script>
</body>
</html>
