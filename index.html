<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>诗调飞花令 · 古风卷轴</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #271e12;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'STKaiti', '华文楷体', 'KaiTi', '楷体', serif;
            padding: 16px;
        }

        /* 固定宽度主容器 1200px */
        .game-container {
            width: 1200px;
            height: 720px;
            background: #f2e1c0;          /* 老宣纸色 */
            border-radius: 60px 60px 40px 40px;
            border: 8px solid #b48b5a;
            box-shadow: 0 20px 30px rgba(0,0,0,0.7), inset 0 2px 10px #efd09e;
            padding: 24px 30px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* 顶部雅印 */
        .game-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px 8px;
            color: #5a3f28;
            font-size: 1.3rem;
            letter-spacing: 6px;
            border-bottom: 2px dashed #c4a177;
        }
        .game-title span {
            background: #cfa776;
            padding: 4px 30px;
            border-radius: 40px;
            border: 2px solid #7b593b;
            font-weight: bold;
            box-shadow: inset 0 -2px 0 #9e7a52;
        }

        /* 三列布局 左右固定 中间固定 */
        .battle-row {
            flex: 1;
            display: flex;
            gap: 24px;
            margin: 18px 0 16px;
            min-height: 0;
        }

        /* 左侧玩家区域 固定宽度300px */
        .player-area {
            width: 300px;
            background: linear-gradient(145deg, #c9af8b, #b0885e);
            border-radius: 50px 12px 50px 12px;
            border: 4px solid #795d3e;
            box-shadow: inset 0 0 0 2px #f7e2c5, 0 10px 10px rgba(0,0,0,0.3);
            padding: 18px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* 右侧AI区域 固定宽度300px */
        .ai-area {
            width: 300px;
            background: linear-gradient(225deg, #c9af8b, #b0885e);
            border-radius: 12px 50px 12px 50px;
            border: 4px solid #795d3e;
            box-shadow: inset 0 0 0 2px #f7e2c5, 0 10px 10px rgba(0,0,0,0.3);
            padding: 18px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* 中间卷轴区域 固定宽度260px */
        .scroll-area {
            width: 260px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .scroll-core {
            width: 100%;
            background: #dbbc87;
            border-radius: 120px 120px 40px 40px;
            border: 8px solid #a37748;
            border-top: 10px solid #c79e68;
            border-bottom: 10px solid #7e592e;
            box-shadow: 0 20px 16px rgba(0,0,0,0.4), inset 0 -8px 8px #9b814b;
            padding: 28px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* 卷轴两侧轴 */
        .scroll-core::before,
        .scroll-core::after {
            content: "";
            position: absolute;
            width: 32px;
            top: -16px;
            bottom: -16px;
            background: radial-gradient(circle at 30% 30%, #c69254, #6f451d);
            border-radius: 30px;
            border: 2px solid #543c1e;
            box-shadow: 0 8px 0 #4d341b;
        }
        .scroll-core::before {
            left: -22px;
        }
        .scroll-core::after {
            right: -22px;
        }

        .theme-word {
            font-size: 7rem;
            font-weight: bold;
            color: #3f260e;
            text-shadow: 4px 4px 0 #dbb27d, 8px 8px 12px #331f0a;
            line-height: 1;
            margin: 10px 0 4px;
            text-align: center;
            transition: all 0.1s;
        }

        .scroll-sub {
            font-size: 1.6rem;
            background: #efdabb;
            padding: 6px 20px;
            border-radius: 50px;
            border: 2px solid #a47a4c;
            margin: 8px 0 4px;
            color: #3f2d16;
        }

        .scroll-status {
            background: #b48b5a;
            color: #ffefcf;
            padding: 6px 24px;
            border-radius: 40px;
            font-size: 1.2rem;
            border: 2px solid #5a3f1f;
            margin-top: 16px;
        }

        /* 人物牌匾 */
        .player-name {
            font-size: 2.2rem;
            background: #382b1a;
            color: #fbeba8;
            padding: 6px 30px;
            border-radius: 50px;
            margin-top: -42px;
            margin-bottom: 16px;
            border: 3px solid #e3be8b;
            box-shadow: 0 6px 0 #3d2e19;
            letter-spacing: 4px;
            transform: rotate(-1deg);
        }

        .ai-name {
            font-size: 2.2rem;
            background: #382b1a;
            color: #fbeba8;
            padding: 6px 30px;
            border-radius: 50px;
            margin-top: -42px;
            margin-bottom: 16px;
            border: 3px solid #e3be8b;
            box-shadow: 0 6px 0 #3d2e19;
            letter-spacing: 4px;
            transform: rotate(1deg);
        }

        .score-board {
            font-size: 3rem;
            font-weight: bold;
            background: #1e160c;
            color: #ffdd9e;
            width: 120px;
            text-align: center;
            border-radius: 80px 20px 80px 20px;
            padding: 8px 0;
            margin: 6px 0 12px;
            border: 3px solid #caa270;
            box-shadow: inset 0 -4px 0 #6e4f2c, 0 8px 0 #302210;
            line-height: 1.2;
        }

        .poem-display {
            background: #fcf3de;
            width: 100%;
            min-height: 110px;
            border-radius: 40px 8px 40px 8px;
            border: 4px solid #a98653;
            padding: 16px 8px;
            margin: 14px 0;
            box-shadow: inset 0 0 20px #dab086, 0 8px 0 #614a2c;
            font-size: 1.3rem;
            text-align: center;
            color: #2b1d0d;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            line-height: 1.6;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .fail-effect {
            background-color: #c07a7a !important;
            box-shadow: inset 0 0 30px #a10202, 0 8px 0 #5f2b2b !important;
            color: #2b0e0e;
            transition: 0.2s;
        }

        .input-group {
            display: flex;
            width: 100%;
            gap: 6px;
            margin-top: 8px;
        }

        .player-input {
            flex: 1;
            background: #f3e5cf;
            border: 3px solid #9e7c54;
            border-radius: 40px 6px 6px 40px;
            padding: 12px;
            font-size: 1.1rem;
            font-family: 'STKaiti', serif;
            outline: none;
            color: #2e200f;
        }
        .player-input:focus {
            background: #ffeed5;
            border-color: #b58647;
        }
        .send-btn {
            background: #b48a51;
            border: 3px solid #604225;
            border-radius: 6px 40px 40px 6px;
            color: #fef0cf;
            font-weight: bold;
            padding: 0 20px;
            font-size: 1.4rem;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: inset -2px -2px 0 #7b5935;
            font-family: 'STKaiti', serif;
        }
        .send-btn:hover:not(:disabled) {
            background: #dba15e;
            color: #1f1408;
        }
        .send-btn:active:not(:disabled) {
            transform: translateY(4px);
            box-shadow: none;
        }
        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* AI占位符 */
        .ai-placeholder {
            width: 100%;
            height: 52px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #503e26;
            font-size: 1.4rem;
            letter-spacing: 4px;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        .turn-indicator {
            background: #755c3a;
            color: #fbeba8;
            padding: 10px 50px;
            border-radius: 50px;
            font-size: 1.8rem;
            border: 3px solid #e2ba82;
            box-shadow: inset 0 -5px 0 #46371f;
            min-width: 280px;
            text-align: center;
        }

        .restart-btn {
            background: #ad7f4c;
            border: none;
            border-radius: 80px;
            padding: 12px 48px;
            font-size: 1.6rem;
            color: #251b0d;
            border-bottom: 6px solid #614324;
            font-family: 'STKaiti', serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
            box-shadow: 0 6px 8px #221608;
        }
        .restart-btn:active {
            transform: translateY(6px);
            border-bottom-width: 2px;
        }

        /* 浮动加分动画 */
        .pop-score {
            position: absolute;
            font-size: 2.8rem;
            font-weight: bold;
            color: #c93f0f;
            text-shadow: 2px 2px 2px gold, 0 0 10px #fdc62e;
            z-index: 100;
            pointer-events: none;
            animation: floatPop 0.9s ease-out forwards;
        }
        @keyframes floatPop {
            0% { opacity: 1; transform: translateY(0) scale(0.8); }
            50% { opacity: 1; transform: translateY(-40px) scale(1.5); }
            100% { opacity: 0; transform: translateY(-90px) scale(2); }
        }

        /* 快闪动画 */
        .flash {
            animation: flashBlink 0.1s infinite alternate;
        }
        @keyframes flashBlink {
            0% { opacity: 0.3; transform: scale(1); text-shadow: 0 0 5px #ffc107; }
            100% { opacity: 1; transform: scale(1.3); text-shadow: 0 0 25px #ffb347, 0 0 35px #ffe68f; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="game-title">
        <span>❀ 令出如山 ❀</span>
        <span>诗 调 飞 花</span>
    </div>

    <div class="battle-row">
        <!-- 左侧玩家 -->
        <div class="player-area" id="playerArea">
            <div class="player-name">· 雅 士 ·</div>
            <div class="score-board" id="playerScore">0</div>
            <div class="poem-display" id="playerPoem">待令...</div>
            <div class="input-group">
                <input type="text" class="player-input" id="poemInput" placeholder="输入诗句" autocomplete="off">
                <button class="send-btn" id="sendBtn">吟对</button>
            </div>
            <div id="playerPopAnchor" style="position: relative; width:0; height:0;"></div>
        </div>

        <!-- 中间卷轴 -->
        <div class="scroll-area">
            <div class="scroll-core">
                <div class="theme-word" id="themeWord">花</div>
                <div class="scroll-sub">· 令 牌 ·</div>
                <div class="scroll-status" id="scrollStatus">摇令中</div>
            </div>
        </div>

        <!-- 右侧AI -->
        <div class="ai-area" id="aiArea">
            <div class="ai-name">· 对 弈 ·</div>
            <div class="score-board" id="aiScore">0</div>
            <div class="poem-display" id="aiPoem">凝神...</div>
            <div class="ai-placeholder">⚘ 诗 心 一 瓣 ⚘</div>
            <div id="aiPopAnchor" style="position: relative; width:0; height:0;"></div>
        </div>
    </div>

    <div class="footer">
        <div class="turn-indicator" id="turnIndicator">🎋 卷 轴 摇 令</div>
        <button class="restart-btn" id="restartBtn">重 开 诗 宴</button>
    </div>
</div>

<script>
    (function() {
        // ---------- 精美诗词库 (包含主题字) ----------
        const poemLibrary = [
            "床前明月光", "疑是地上霜", "举头望明月", "低头思故乡",
            "春眠不觉晓", "处处闻啼鸟", "夜来风雨声", "花落知多少",
            "白日依山尽", "黄河入海流", "欲穷千里目", "更上一层楼",
            "千山鸟飞绝", "万径人踪灭", "孤舟蓑笠翁", "独钓寒江雪",
            "风雪夜归人", "能饮一杯无", "晚来天欲雪", "红泥小火炉",
            "春花秋月何时了", "小楼昨夜又东风", "故国不堪回首月明中",
            "恰似一江春水向东流", "人生若只如初见", "何事秋风悲画扇",
            "落霞与孤鹜齐飞", "秋水共长天一色", "春江潮水连海平",
            "海上明月共潮生", "江畔何人初见月", "江月何年初照人",
            "不知江月待何人", "但见长江送流水", "空里流霜不觉飞",
            "汀上白沙看不见", "江天一色无纤尘", "皎皎空中孤月轮",
            "感时花溅泪", "恨别鸟惊心", "烽火连三月", "家书抵万金",
            "国破山河在", "城春草木深", "夜静春山空", "月出惊山鸟",
            "采菊东篱下", "悠然见南山", "山气日夕佳", "飞鸟相与还",
            "明月松间照", "清泉石上流", "竹喧归浣女", "莲动下渔舟",
            "大漠孤烟直", "长河落日圆", "山光悦鸟性", "潭影空人心",
            "众鸟高飞尽", "孤云独去闲", "相看两不厌", "只有敬亭山"
        ];

        // 主题字池 (用于快闪)
        const themePool = ['花', '春', '雪', '月', '风', '霜', '夜', '江', '山', '水', '鸟', '日', '云', '雨', '人', '酒'];

        // ---------- DOM 元素 ----------
        const themeWord = document.getElementById('themeWord');
        const scrollStatus = document.getElementById('scrollStatus');
        const playerScoreSpan = document.getElementById('playerScore');
        const aiScoreSpan = document.getElementById('aiScore');
        const playerPoemDiv = document.getElementById('playerPoem');
        const aiPoemDiv = document.getElementById('aiPoem');
        const turnIndicator = document.getElementById('turnIndicator');
        const poemInput = document.getElementById('poemInput');
        const sendBtn = document.getElementById('sendBtn');
        const restartBtn = document.getElementById('restartBtn');
        const playerArea = document.getElementById('playerArea');
        const aiArea = document.getElementById('aiArea');
        const playerPopAnchor = document.getElementById('playerPopAnchor');
        const aiPopAnchor = document.getElementById('aiPopAnchor');

        // ---------- 游戏状态 ----------
        let currentTheme = '花';              // 当前主题字
        let playerScore = 0, aiScore = 0;
        let gameActive = false;               // true: 快闪结束, 双方可以对决
        let currentTurn = 'player';            // 'player' 或 'ai'
        let isFlashing = false;                // 是否正在快闪
        let flashInterval = null;
        let flashStopTimer = null;
        let aiTimer = null;
        let failTimer = null;                  // 失败后展示用定时器

        // ---------- 辅助函数: 浮动加分 ----------
        function showPop(targetArea, delta) {
            const pop = document.createElement('div');
            pop.className = 'pop-score';
            pop.innerText = '+' + delta;
            pop.style.left = '140px';
            pop.style.top = '70px';
            targetArea.appendChild(pop);
            setTimeout(() => pop.remove(), 900);
        }

        // 更新分数显示
        function updateScores() {
            playerScoreSpan.innerText = playerScore;
            aiScoreSpan.innerText = aiScore;
        }

        // 清除所有AI计时
        function clearAiTimer() {
            if (aiTimer) {
                clearTimeout(aiTimer);
                aiTimer = null;
            }
        }

        // 清除快闪定时器
        function clearFlashTimers() {
            if (flashInterval) {
                clearInterval(flashInterval);
                flashInterval = null;
            }
            if (flashStopTimer) {
                clearTimeout(flashStopTimer);
                flashStopTimer = null;
            }
        }

        // 清除失败特效定时器
        function clearFailTimer() {
            if (failTimer) {
                clearTimeout(failTimer);
                failTimer = null;
            }
        }

        // 移除所有特效class
        function removeFailEffects() {
            playerPoemDiv.classList.remove('fail-effect');
            aiPoemDiv.classList.remove('fail-effect');
        }

        // 重置回合（开始快闪，不清除分数）
        function startFlashing() {
            clearAiTimer();
            clearFlashTimers();
            clearFailTimer();
            removeFailEffects();

            gameActive = false;
            currentTurn = 'player';     // 占位
            turnIndicator.innerText = '🎋 卷 轴 摇 令';
            scrollStatus.innerText = '摇令中';
            themeWord.classList.add('flash');

            isFlashing = true;
            // 每120ms变换主题字
            flashInterval = setInterval(() => {
                const randomIndex = Math.floor(Math.random() * themePool.length);
                themeWord.innerText = themePool[randomIndex];
            }, 120);

            // 随机时间后停止快闪 (2~3.5秒之间)
            const stopDelay = 2000 + Math.floor(Math.random() * 1500);
            flashStopTimer = setTimeout(() => {
                stopFlashing();
            }, stopDelay);
        }

        // 停止快闪，固定主题，开始对诗
        function stopFlashing() {
            if (!isFlashing) return; // 防止重复调用
            clearInterval(flashInterval);
            flashInterval = null;
            themeWord.classList.remove('flash');
            isFlashing = false;

            // 固定当前显示的字为主题
            currentTheme = themeWord.innerText;
            scrollStatus.innerText = '令曰 · ' + currentTheme;
            gameActive = true;
            // 总是玩家先手
            currentTurn = 'player';
            turnIndicator.innerText = '👤 雅 士 回 合';
            // 启用输入 (如果之前被禁用，恢复)
            poemInput.disabled = false;
            sendBtn.disabled = false;
            poemInput.focus();
        }

        // ---------- 失败处理 ----------
        function handleFail(side) {
            if (!gameActive) return;          // 不在对战中

            // 清除AI定时器
            clearAiTimer();
            // 游戏失活，禁止操作
            gameActive = false;
            poemInput.disabled = true;
            sendBtn.disabled = true;

            // 对方得分
            if (side === 'player') {
                aiScore += 1;
                showPop(aiPopAnchor, 1);
                aiPoemDiv.innerText = '对方失对 · 得一分';
                playerPoemDiv.innerText = '··· 失 对 ···';
                // 失败特效
                playerPoemDiv.classList.add('fail-effect');
            } else {
                playerScore += 1;
                showPop(playerPopAnchor, 1);
                playerPoemDiv.innerText = '对方失对 · 得一分';
                aiPoemDiv.innerText = '··· 失 对 ···';
                aiPoemDiv.classList.add('fail-effect');
            }
            updateScores();

            turnIndicator.innerText = '⚡ 一 方 失 对';

            // 1.8秒后重新开始快闪 (新的一轮)
            failTimer = setTimeout(() => {
                removeFailEffects();
                // 重置诗句显示
                playerPoemDiv.innerText = '待令...';
                aiPoemDiv.innerText = '凝神...';
                startFlashing();
            }, 1800);
        }

        // ---------- AI 行动 ----------
        function aiMove() {
            if (!gameActive || currentTurn !== 'ai') return;

            // 查找包含当前主题字的诗句
            const possible = poemLibrary.filter(line => line.includes(currentTheme));
            let chosen = '';
            if (possible.length > 0) {
                chosen = possible[Math.floor(Math.random() * possible.length)];
            } else {
                // 如果库中都没有，生成一句包含主题的示例
                chosen = `一江${currentTheme}向东流`;  // 兜底
            }

            // AI吟诗
            aiPoemDiv.innerText = '「' + chosen + '」';
            aiScore += 1;
            showPop(aiPopAnchor, 1);
            updateScores();

            // 切换到玩家回合
            currentTurn = 'player';
            turnIndicator.innerText = '👤 雅 士 回 合';
            poemInput.disabled = false;
            sendBtn.disabled = false;
            poemInput.focus();
        }

        // ---------- 玩家提交诗句 ----------
        function playerSubmit() {
            if (!gameActive || currentTurn !== 'player') {
                alert('现在不是您的回合');
                return;
            }

            const input = poemInput.value.trim();
            if (input === '') return;

            // 检查是否包含当前主题字
            if (!input.includes(currentTheme)) {
                alert(`诗句必须包含「${currentTheme}」字`);
                return;
            }

            // 玩家成功
            playerPoemDiv.innerText = '「' + input + '」';
            playerScore += 1;
            showPop(playerPopAnchor, 1);
            updateScores();

            poemInput.value = '';
            // 切换到AI回合
            currentTurn = 'ai';
            turnIndicator.innerText = '🤖 对 弈 回 合';
            poemInput.disabled = true;
            sendBtn.disabled = true;

            // 设定AI思考时间
            clearAiTimer();
            aiTimer = setTimeout(() => {
                aiMove();
            }, 1000);
        }

        // ---------- 重置游戏 (完全重开) ----------
        function restartGame() {
            // 清除所有定时器
            clearAiTimer();
            clearFlashTimers();
            clearFailTimer();
            removeFailEffects();

            // 重置分数
            playerScore = 0;
            aiScore = 0;
            updateScores();

            // 清空诗词框
            playerPoemDiv.innerText = '待令...';
            aiPoemDiv.innerText = '凝神...';
            poemInput.value = '';
            poemInput.disabled = true;      // 刚开始快闪，不可输入
            sendBtn.disabled = true;

            // 随机初始化一个主题字
            currentTheme = themePool[Math.floor(Math.random() * themePool.length)];
            themeWord.innerText = currentTheme;
            // 开始快闪
            startFlashing();
        }

        // ---------- 事件绑定 ----------
        sendBtn.addEventListener('click', playerSubmit);
        poemInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') playerSubmit();
        });
        restartBtn.addEventListener('click', restartGame);

        // 初始化游戏
        restartGame();

        // 额外保护：如果AI长时间没反应（极少情况），但已经设置定时器
        // 若在AI回合中闪断，确保gameActive=false时不会调用aiMove。
    })();
</script>
</body>
</html>
